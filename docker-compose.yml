services:
  postgres:
    image: postgres:16-alpine
    container_name: scale-admin-postgres
    environment:
      POSTGRES_DB: scale_admin
      POSTGRES_USER: scale_admin
      POSTGRES_PASSWORD: scale_admin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scale_admin -d scale_admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: scale-admin-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://scale_admin:scale_admin_password@postgres:5432/scale_admin
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: scale-admin-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
